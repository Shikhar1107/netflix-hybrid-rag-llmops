services:
  api:
    build: .
    container_name: netflix-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
    depends_on:
      - redis
      - neo4j
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./reports:/app/reports

  redis:
    image: redis:alpine
    container_name: netflix-redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:latest
    container_name: netflix-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs: